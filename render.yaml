services:
  - type: keyvalue
    name: legal-analyzer-cache
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: off

  - type: web
    name: legal-document-analyzer-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: legal-analyzer-cache
          property: connectionString
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENABLE_DEMO_ACCOUNT
        value: "true"
      - key: DEMO_EMAIL
        value: xyz@gmail.com
      - key: DEMO_PASSWORD
        value: "123456"
      - key: DAILY_LIVE_ANALYSIS_LIMIT
        value: "1"
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: MAX_DOCUMENT_PAGES
        value: "80"
      - key: MAX_DOCUMENT_TEXT_CHARS
        value: "140000"

  - type: web
    name: legal-document-analyzer
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    autoDeployTrigger: commit
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
